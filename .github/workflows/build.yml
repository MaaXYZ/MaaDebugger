name: Build

on:
  push:
    branches:
      - "rft/nodejs"
    paths:
      - ".github/workflows/**"
      - "build.mjs"
      - "publish/dependence.txt"
      - "server/**"
      - "web/**"

  workflow_dispatch:

  workflow_call:

permissions:
  contents: read

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30

      - name: Prepare build metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" || -z "${VERSION}" ]]; then
            VERSION="dev"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Build frontend
        run: node build.mjs --skip-go

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: server/frontend/dist
          if-no-files-found: error

  build:
    needs: build-frontend
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: ubuntu-latest
            maafw_os: win
            maafw_arch: x86_64
            ext: .exe
          - goos: windows
            goarch: arm64
            runner: ubuntu-latest
            maafw_os: win
            maafw_arch: aarch64
            ext: .exe
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            maafw_os: linux
            maafw_arch: x86_64
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            maafw_os: linux
            maafw_arch: aarch64
            ext: ""
          - goos: darwin
            goarch: amd64
            runner: ubuntu-latest
            maafw_os: macos
            maafw_arch: x86_64
            ext: ""
          - goos: darwin
            goarch: arm64
            runner: ubuntu-latest
            maafw_os: macos
            maafw_arch: aarch64
            ext: ""

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod

      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: server/frontend/dist

      - name: Prepare build metadata
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" || -z "${VERSION}" ]]; then
            VERSION="dev"
          fi

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date +%s)" >> "$GITHUB_ENV"

      - name: Load dependency versions
        shell: bash
        run: |
          cat publish/dependence.txt >> "$GITHUB_ENV"
          source publish/dependence.txt

          if [[ -z "${MAAFW_VERSION}" ]]; then
            echo "MAAFW_VERSION is empty in publish/dependence.txt" >&2
            exit 1
          fi

      - name: Download MaaFramework
        uses: robinraju/release-downloader@v1
        with:
          repository: MaaXYZ/MaaFramework
          tag: ${{ env.MAAFW_VERSION }}
          latest: false
          fileName: MAA-${{ matrix.maafw_os }}-${{ matrix.maafw_arch }}*.zip
          out-file-path: maafw_dl
          extract: true
          preRelease: true

      - name: Build Go binary
        run: node build.mjs --skip-frontend --os ${{ matrix.goos }} --arch ${{ matrix.goarch }}

      - name: Package release artifact
        shell: bash
        run: |
          ARTIFACT_NAME="MaaDebugger-${{ matrix.maafw_os }}-${{ matrix.maafw_arch }}"
          mkdir -p "${ARTIFACT_NAME}/bin"

          cp "MaaDebugger${{ matrix.ext }}" "${ARTIFACT_NAME}/"
          cp -r maafw_dl/bin/* "${ARTIFACT_NAME}/bin/"

          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}
          if-no-files-found: error
