name: npm Nightly

on:
  push:
    branches:
      - "rft/nodejs"
    tags-ignore:
      - "**"
    paths:
      - ".github/workflows/**"
      - "build.mjs"
      - "publish/**"
      - "server/**"
      - "web/**"
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: npm-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metadata:
    uses: ./.github/workflows/metadata.yml

  build:
    needs: metadata
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.metadata.outputs.version }}
      commit_sha: ${{ needs.metadata.outputs.commit_sha }}
      build_time: ${{ needs.metadata.outputs.build_time }}

  package-nodejs-nightly:
    name: Package nodejs nightly
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: MaaDebugger-win-x86_64
            artifact_id: maa-debugger-win32-x64
            package_name: "@weinibuliu/maa-debugger-win32-x64"
            os: win32
            cpu: x64
            bin_name: MaaDebugger.exe
          - artifact_name: MaaDebugger-win-aarch64
            artifact_id: maa-debugger-win32-arm64
            package_name: "@weinibuliu/maa-debugger-win32-arm64"
            os: win32
            cpu: arm64
            bin_name: MaaDebugger.exe
          - artifact_name: MaaDebugger-linux-x86_64
            artifact_id: maa-debugger-linux-x64
            package_name: "@weinibuliu/maa-debugger-linux-x64"
            os: linux
            cpu: x64
            bin_name: MaaDebugger
          - artifact_name: MaaDebugger-linux-aarch64
            artifact_id: maa-debugger-linux-arm64
            package_name: "@weinibuliu/maa-debugger-linux-arm64"
            os: linux
            cpu: arm64
            bin_name: MaaDebugger
          - artifact_name: MaaDebugger-macos-x86_64
            artifact_id: maa-debugger-darwin-x64
            package_name: "@weinibuliu/maa-debugger-darwin-x64"
            os: darwin
            cpu: x64
            bin_name: MaaDebugger
          - artifact_name: MaaDebugger-macos-aarch64
            artifact_id: maa-debugger-darwin-arm64
            package_name: "@weinibuliu/maa-debugger-darwin-arm64"
            os: darwin
            cpu: arm64
            bin_name: MaaDebugger

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: .artifacts/platform

      - name: Prepare nodejs nightly package
        shell: bash
        run: |
          rm -rf dist/platform .artifacts/platform/extracted
          mkdir -p dist/platform .artifacts/platform/extracted

          SOURCE_DIR=".artifacts/platform"

          if [[ "${{ matrix.os }}" != "win32" ]]; then
            tar -xzf ".artifacts/platform/${{ matrix.artifact_name }}.tar.gz" -C .artifacts/platform/extracted
            SOURCE_DIR=".artifacts/platform/extracted/${{ matrix.artifact_name }}"
          fi

          BIN_SOURCE="$(find "${SOURCE_DIR}" -maxdepth 2 -type f -name "${{ matrix.bin_name }}" | head -n 1)"

          if [[ -z "${BIN_SOURCE}" ]]; then
            echo "Failed to locate ${{ matrix.bin_name }} under ${SOURCE_DIR}" >&2
            exit 1
          fi

          cp publish/npm/platform-package.json dist/platform/package.json
          cp README.md LICENSE dist/platform/
          cp "${BIN_SOURCE}" "dist/platform/${{ matrix.bin_name }}"

          if [[ "${{ matrix.os }}" != "win32" ]]; then
            chmod 755 "dist/platform/${{ matrix.bin_name }}"
          fi

          PACKAGE_JSON_PATH="dist/platform/package.json" \
          PACKAGE_NAME="${{ matrix.package_name }}" \
          TARGET_OS="${{ matrix.os }}" \
          TARGET_CPU="${{ matrix.cpu }}" \
          node .github/scripts/prepare-npm-package.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_id }}
          path: dist/platform
          if-no-files-found: error

  package-nodejs-main-nightly:
    name: Package maa-debugger nightly
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Prepare main nightly package
        shell: bash
        run: |
          rm -rf dist/main
          mkdir -p dist/main

          cp publish/npm/package.json dist/main/package.json
          cp publish/npm/index.js dist/main/index.js
          cp README.md LICENSE dist/main/

          PACKAGE_JSON_PATH="dist/main/package.json" \
          node .github/scripts/prepare-npm-package.mjs

      - uses: actions/upload-artifact@v7
        with:
          name: maa-debugger
          path: dist/main
          if-no-files-found: error

  merge-nodejs-nightly-artifacts:
    name: Merge nodejs nightly artifacts
    needs:
      - package-nodejs-nightly
      - package-nodejs-main-nightly
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: "*"
          path: assets/pkgs-nodejs
          merge-multiple: false

      - uses: actions/upload-artifact@v7
        with:
          name: pkgs-nodejs
          path: assets/pkgs-nodejs
          if-no-files-found: error

  publish-nodejs-nightly:
    name: Publish nodejs nightly
    needs:
      - merge-nodejs-nightly-artifacts
      - metadata
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: pkgs-nodejs
          path: assets/pkgs-nodejs

      - name: Restore UNIX executable permissions before publish
        shell: bash
        run: |
          find assets/pkgs-nodejs -type f -name 'MaaDebugger' -exec chmod 755 {} +

      - uses: ./.github/actions/publish_nodejs
        id: publish
        with:
          access: public
          path: assets/pkgs-nodejs
          tag: nightly
          dry-run: false
          token: ${{ secrets.NPM_TOKEN }}

      - name: Mark nightly as latest
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm dist-tag add @weinibuliu/maa-debugger@${{ needs.metadata.outputs.version }} latest
          npm dist-tag add @weinibuliu/maa-debugger-win32-x64@${{ needs.metadata.outputs.version }} latest
          npm dist-tag add @weinibuliu/maa-debugger-win32-arm64@${{ needs.metadata.outputs.version }} latest
          npm dist-tag add @weinibuliu/maa-debugger-linux-x64@${{ needs.metadata.outputs.version }} latest
          npm dist-tag add @weinibuliu/maa-debugger-linux-arm64@${{ needs.metadata.outputs.version }} latest
          npm dist-tag add @weinibuliu/maa-debugger-darwin-x64@${{ needs.metadata.outputs.version }} latest
          npm dist-tag add @weinibuliu/maa-debugger-darwin-arm64@${{ needs.metadata.outputs.version }} latest

      - name: Trigger MaaAPI
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.MAA_API_TOKEN }}
          repository: MaaXYZ/MaaFwAPI
          event-type: MaaDebugger-Nightly
          client-payload: |-
            {
              "nightly": {
                "version": "${{ github.sha }}",
                "timestamp": "${{ needs.metadata.outputs.build_time }}"
              },
              "pre": {},
              "release": {}
            }
